    <div class="container my-5">
        <h2 class="text-center mb-5 fw-bold text-primary">Formularios de Acceso y Registro</h2>
        
        <!-- Contenedor del Grid Principal (6 y 6) -->
        <div class="row g-4">
            
            <!-- Columna 1: Registro (Ocupa 6 columnas en pantallas md o superiores) -->
            <div class="col-12 col-md-6">
                <div class="card h-100 shadow-sm p-4">
                    <h3 class="card-title text-secondary mb-4 pb-2 border-bottom">Crear Cuenta</h3>
                    
                    <form>
                        <!-- 1. Número de Documento -->
                        <div class="mb-3">
                            <label for="regDocumento" class="form-label fw-semibold">Número de Documento</label>
                            <input type="number" class="form-control" id="regDocumento" placeholder="Ej: 12345678" required>
                        </div>

                        <!-- 2. Nombre -->
                        <div class="mb-3">
                            <label for="regNombre" class="form-label fw-semibold">Nombre</label>
                            <input type="text" class="form-control" id="regNombre" placeholder="Tu nombre" required>
                        </div>

                        <!-- 3. Apellido -->
                        <div class="mb-3">
                            <label for="regApellido" class="form-label fw-semibold">Apellido</label>
                            <input type="text" class="form-control" id="regApellido" placeholder="Tu apellido" required>
                        </div>

                        <!-- 4. Edad -->
                        <div class="mb-3">
                            <label for="regEdad" class="form-label fw-semibold">Edad</label>
                            <input type="number" class="form-control" id="regEdad" min="0" placeholder="Ej: 20" required>
                        </div>

                        <!-- 5. Correo -->
                        <div class="mb-3">
                            <label for="regEmail" class="form-label fw-semibold">Correo Electrónico</label>
                            <input type="email" class="form-control" id="regEmail" placeholder="nombre@correo.com" required>
                        </div>

                        <!-- 6. Contraseña -->
                        <div class="mb-4">
                            <label for="regPassword" class="form-label fw-semibold">Contraseña</label>
                            <input type="password" class="form-control" id="regPassword" placeholder="Crea una contraseña segura" required>
                        </div>

                        <!-- Botón de Registro -->
                        <button type="submit" class="btn btn-primary w-100">Registrarse</button>
                    </form>
                </div>
            </div>

            <!-- Columna 2: Login (Ocupa 6 columnas en pantallas md o superiores) -->
            <div class="col-12 col-md-6">
                <div class="card h-100 shadow-sm p-4">
                    <h3 class="card-title text-secondary mb-4 pb-2 border-bottom">Iniciar Sesión</h3>
                    
                    <form>
                        <!-- 1. Correo -->
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label fw-semibold">Correo Electrónico</label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="nombre@correo.com" required>
                        </div>

                        <!-- 2. Contraseña -->
                        <div class="mb-4">
                            <label for="loginPassword" class="form-label fw-semibold">Contraseña</label>
                            <input type="password" class="form-control" id="loginPassword" placeholder="Ingresa tu contraseña" required>
                        </div>

                        <!-- Botón de Login -->
                        <button type="submit" class="btn btn-success w-100">Ingresar</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Script de Bootstrap 5 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
