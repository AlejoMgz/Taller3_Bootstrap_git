<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios de Acceso</title>
    <link class="shortcut icon" href="../assets/img/yo.jpg" type="image/x-icon">

    <meta name="author" content="Alejandro Mesa">
    <meta name="description" content="taller 3 de bootstrap optimizado">
    <meta name="keywords" content="TALLER, taller, Taller">

    <meta name="theme-color" content="#1328EB">
    <meta name="MobileOptimized" content="width">
    <meta name="HandheldFriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-body-secondary text-dark d-flex flex-column min-vh-100 pt-5">

    <header class="shadow-sm fixed-top">
        <nav class="navbar navbar-dark bg-dark py-2" aria-label="Main navigation">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
                    <img src="../assets/img/yo.jpg" alt="Alejandro Mesa Avatar" style="width:40px; height: 40px;" class="rounded-circle border border-2 border-secondary">
                    <span class="fs-5 fw-bold text-white tracking-wide">Taller 3</span>
                </a>
                
                <div class="ms-auto">
                    <a class="btn btn-outline-light btn-sm fw-medium px-3 py-1.5 rounded-2 d-inline-flex align-items-center" href="../index.html">
                        <i class="bi bi-house-door me-1.5"></i>Volver a Inicio
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5 flex-grow-1 d-flex flex-column justify-content-center" style="max-width: 500px;">
        
        <div class="text-center mb-4">
            <h1 class="h3 fw-bold text-dark mb-1">Formulario</h1>
            <p class="text-secondary small">Ingresa o crea una cuenta nueva</p>
        </div>

        <ul class="nav nav-pills nav-justified p-1 bg-white bg-opacity-75 rounded-3 shadow-sm mb-4" id="formTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active fw-semibold py-2.5 rounded-3" id="login-tab" data-bs-toggle="tab" data-bs-target="#loginPanel" type="button" role="tab" aria-controls="loginPanel" aria-selected="true">
                    <i class="bi bi-shield-lock me-2"></i>Iniciar Sesión
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link fw-semibold py-2.5 rounded-3" id="register-tab" data-bs-toggle="tab" data-bs-target="#registerPanel" type="button" role="tab" aria-controls="registerPanel" aria-selected="false">
                    <i class="bi bi-person-plus me-2"></i>Crear Cuenta
                </button>
            </li>
        </ul>

        <div class="tab-content" id="formTabsContent">
            
            <div class="tab-pane fade show active" id="loginPanel" role="tabpanel" aria-labelledby="login-tab">
                <div class="card shadow border-0 rounded-3 bg-white p-4 p-sm-5">
                    <h2 class="h4 fw-bold mb-4 text-center text-primary">Ingresar al Sistema</h2>
                    <form>
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label fw-semibold text-dark small">Correo Electrónico</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-secondary"><i class="bi bi-envelope" aria-hidden="true"></i></span>
                                <input type="email" class="form-control bg-light border-start-0 ps-0 text-dark" id="loginEmail" placeholder="nombre@correo.com" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="loginPassword" class="form-label fw-semibold text-dark small">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-secondary"><i class="bi bi-lock" aria-hidden="true"></i></span>
                                <input type="password" class="form-control bg-light border-start-0 ps-0 text-dark" id="loginPassword" placeholder="Ingresa tu contraseña" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2.5 fw-semibold shadow-sm">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                        </button>
                    </form>
                </div>
            </div>

            <div class="tab-pane fade" id="registerPanel" role="tabpanel" aria-labelledby="register-tab">
                <div class="card shadow border-0 rounded-3 bg-white p-4 p-sm-5">
                    <h2 class="h4 fw-bold mb-4 text-center text-success">Registro de Usuario</h2>
                    <form>
                        <div class="mb-3">
                            <label for="regDocumento" class="form-label fw-semibold text-dark small">Número de Documento</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-secondary"><i class="bi bi-card-text" aria-hidden="true"></i></span>
                                <input type="number" class="form-control bg-light border-start-0 ps-0 text-dark" id="regDocumento" placeholder="Ej: 12345678" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <label for="regNombre" class="form-label fw-semibold text-dark small">Nombre</label>
                                <input type="text" class="form-control bg-light text-dark" id="regNombre" placeholder="Tu nombre" required>
                            </div>
                            <div class="col-sm-6">
                                <label for="regApellido" class="form-label fw-semibold text-dark small">Apellido</label>
                                <input type="text" class="form-control bg-light text-dark" id="regApellido" placeholder="Tu apellido" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="regEdad" class="form-label fw-semibold text-dark small">Edad</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-secondary"><i class="bi bi-calendar-event" aria-hidden="true"></i></span>
                                <input type="number" class="form-control bg-light border-start-0 ps-0 text-dark" id="regEdad" min="0" placeholder="Ej: 20" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="regEmail" class="form-label fw-semibold text-dark small">Correo Electrónico</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-secondary"><i class="bi bi-envelope" aria-hidden="true"></i></span>
                                <input type="email" class="form-control bg-light border-start-0 ps-0 text-dark" id="regEmail" placeholder="nombre@correo.com" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="regPassword" class="form-label fw-semibold text-dark small">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-secondary"><i class="bi bi-lock" aria-hidden="true"></i></span>
                                <input type="password" class="form-control bg-light border-start-0 ps-0 text-dark" id="regPassword" placeholder="Crea una contraseña segura" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100 py-2.5 fw-semibold shadow-sm">
                            <i class="bi bi-person-check me-2"></i>Registrarse
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto border-top border-secondary">
        <div class="container text-center">
            <div class="mb-3 d-flex justify-content-center gap-4">
                <a href="#" class="text-white-50 text-decoration-none fs-4" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
                <a href="#" class="text-white-50 text-decoration-none fs-4" aria-label="WhatsApp"><i class="bi bi-whatsapp"></i></a>
                <a href="#" class="text-white-50 text-decoration-none fs-4" aria-label="GitHub"><i class="bi bi-github"></i></a>
            </div>
            <p class="mb-0 text-white-50 small">Alejandro Mesa. Todos los derechos reservados © 2026.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
